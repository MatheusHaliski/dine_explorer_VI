runConfig:
  minInstances: 0

# [DB-TUNING] Environment variables for explicit Firestore database routing.
env:
  - variable: NEXT_FIREBASE_DATABASE_ID
    value: newdedb
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_ID
    value: newdedb
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_FIREBASE_ADMIN_PROJECT_ID
    value: funcionarioslistaapp2025
    availability:
      - RUNTIME

  - variable: NEXT_FIREBASE_ADMIN_CLIENT_EMAIL
    secret: firebase-admin-client-email
    availability:
      - RUNTIME

  - variable: NEXT_FIREBASE_ADMIN_PRIVATE_KEY
    secret: firebase-admin-private-key
    availability:
      - RUNTIME
